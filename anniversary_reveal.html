
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html { background: transparent; }

  .scene {
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }

  .petals-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .petal {
    position: absolute;
    width: 10px;
    height: 14px;
    border-radius: 50% 50% 50% 0;
    background: #f9c6d5;
    opacity: 0.5;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(460px) rotate(360deg); opacity: 0; }
  }

  /* ─── CARD 1: Teaser ─── */
  .card {
    position: relative;
    z-index: 1;
    background: #fff0f5;
    border: 2px solid #f4a8c0;
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px #f7b6cd44;
    transition: opacity 0.5s, transform 0.5s;
  }

  .card.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
    position: absolute;
  }

  .hearts-row {
    font-size: 22px;
    letter-spacing: 6px;
    margin-bottom: 1rem;
  }

  .bold-line {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: #b5365e;
    margin-bottom: 1.2rem;
    line-height: 1.3;
  }

  .btn {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.65rem 2rem;
    background: linear-gradient(135deg, #f48fb1, #e91e8c);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px #e91e8c44;
  }

  .btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px #e91e8c55; }
  .btn:active { transform: scale(0.97); }

  /* ─── CARD 2: Reveal ─── */
  .reveal-card {
    position: relative;
    z-index: 1;
    background: #fff;
    border: 2px solid #f4a8c0;
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px #f7b6cd44;
    display: none;
    animation: popIn 0.5s ease both;
  }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.85); }
    70%  { transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }

  .reveal-card.show { display: block; }

  .ribbon {
    background: linear-gradient(90deg, #f48fb1, #e91e8c, #f48fb1);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 20px;
    border-radius: 50px;
    display: inline-block;
    margin-bottom: 1.2rem;
  }

  .main-msg {
    font-family: 'Dancing Script', cursive;
    font-size: 30px;
    color: #c0185f;
    line-height: 1.4;
    margin-bottom: 0.5rem;
  }

  .to-line {
    font-size: 14px;
    color: #b5365e;
    font-weight: 600;
    margin-bottom: 1.3rem;
    letter-spacing: 0.3px;
  }

  .names {
    font-family: 'Dancing Script', cursive;
    font-size: 26px;
    color: #e91e8c;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #f48fb1, #e91e8c);
    border-radius: 2px;
    margin: 1rem auto;
  }

  .footer-hearts {
    font-size: 20px;
    letter-spacing: 8px;
    margin-top: 0.5rem;
    animation: pulse 1.2s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to   { transform: scale(1.15); }
  }
</style>

<div class="scene">

  <!-- Falling petals -->
  <div class="petals-bg" id="petals"></div>

  <!-- Card 1: Teaser -->
  <div class="card" id="teaser">
    <div class="hearts-row">🌸 💕 🌸</div>
    <div class="bold-line">Something special is waiting for you...</div>
    <p style="font-size:14px; color:#c06080; margin-bottom:1.4rem;">A little message of love is just one click away 💝</p>
    <button class="btn" onclick="reveal()">Click Here 💌</button>
  </div>

  <!-- Card 2: Reveal -->
  <div class="reveal-card" id="revealCard">
    <div class="ribbon">🎀 Special Moment 🎀</div>
    <div class="main-msg">Happy First Meet<br>Second Month Anniversary</div>
    <div class="divider"></div>
    <div class="to-line">with all our hearts, to</div>
    <div class="names">Nandankumar loves Poornima 💕</div>
    <div class="divider"></div>
    <div class="footer-hearts">💗 💖 💗</div>
  </div>

</div>

<script>
  (function() {
    const container = document.getElementById('petals');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDuration = (4 + Math.random() * 5) + 's';
      p.style.animationDelay = (Math.random() * 5) + 's';
      p.style.transform = 'rotate(' + (Math.random()*180) + 'deg)';
      p.style.opacity = (0.3 + Math.random()*0.4).toString();
      const hue = Math.random() > 0.5 ? '#f9c6d5' : '#fce4ec';
      p.style.background = hue;
      container.appendChild(p);
    }
  })();

  function reveal() {
    document.getElementById('teaser').classList.add('hidden');
    const rc = document.getElementById('revealCard');
    rc.classList.add('show');
  }
</script>
